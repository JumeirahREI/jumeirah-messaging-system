[build]
  command = "bun run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"

# @netlify/nextjs plugin handles SSR + static optimization.
# Environment variables set in Netlify dashboard or via CLI:
#   TURSO_DATABASE_URL  — libSQL/Turso remote database URL
#   TURSO_AUTH_TOKEN    — Turso auth token
#   AUTH_SECRET         — NextAuth.js signing secret (>= 32 chars)
#   AUTH_URL            — NextAuth.js base URL (production)
#   SMS_FAIL_RATE       — (optional) 0..1 simulated failure rate for FakeSmsGateway
